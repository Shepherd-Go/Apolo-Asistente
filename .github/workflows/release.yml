name: Release automático

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Crear release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Calcular versión y generar notas
        id: version
        run: python .github/scripts/generar_release.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Crear tag y release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.nombre }}
          body: ${{ steps.version.outputs.notas }}
          token: ${{ secrets.GITHUB_TOKEN }}
